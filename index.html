<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SYSTEM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#050814;color:#d6e2f0;}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;
width:200px;height:100%;
background:#0b1220;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid #1e293b;
}
.sidebar h2{color:#3b82f6;}
.sidebar a{cursor:pointer;padding:8px;border-radius:5px;}
.sidebar a:hover{background:#1e293b;}

/* PAGES */
.page{display:none;margin-left:220px;padding:20px;}
.page.active{display:block;}

/* SLIDER */
.slider{height:260px;background:#0b1220;position:relative;border-radius:10px;overflow:hidden;}
.slide{
position:absolute;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
opacity:0;transition:.5s;
font-size:22px;
}
.slide.active{opacity:1;}

.nav span{
position:absolute;top:50%;transform:translateY(-50%);
font-size:30px;color:#fff;cursor:pointer;
}
.nav span:first-child{left:10px;}
.nav span:last-child{right:10px;}

.dots{
position:absolute;bottom:10px;width:100%;text-align:center;
}
.dots span{
width:10px;height:10px;background:#444;
display:inline-block;border-radius:50%;margin:4px;cursor:pointer;
}
.dots span.active{background:#3b82f6;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}
.card{
background:#0b1220;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
text-align:center;
}
.card b{font-size:22px;color:#3b82f6;}

/* SUPORTE */
.suporte-card{
background:#0b1220;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
}
.suporte-card input,
.suporte-card textarea{
padding:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:#fff;
}

/* CHAMADOS */
.chamados-container{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}
.chamado-card{
background:#0b1220;
border:1px solid #1e293b;
padding:15px;
border-radius:10px;
}

/* CONTATOS (CORRIGIDO ESPAÇO) */
.social-cards{
display:flex;
flex-direction:column;
gap:15px;
margin-top:25px;
padding-top:10px;
}
.social-card{
background:#0b1220;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
display:flex;
gap:10px;
cursor:pointer;
transition:.3s;
}
.social-card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px rgba(59,130,246,0.5);
}

/* FLOAT */
.chat-btn{
position:fixed;
bottom:80px;
right:20px;
width:55px;height:55px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
}

.chat-box{
position:fixed;
bottom:140px;
right:20px;
width:280px;
background:#0b1220;
display:none;
flex-direction:column;
border-radius:10px;
border:1px solid #1e293b;
}

.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:#fff;
text-decoration:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>NEXUS</h2>
<a onclick="showPage('home')">🏠 Dashboard</a>
<a onclick="showPage('system')">🖥 Sistema</a>
<a onclick="showPage('support')">💬 Suporte</a>
<a onclick="showPage('about')">📄 Sobre</a>
<a onclick="showPage('course')">🎓 Cursos</a>
<a onclick="showPage('ods')">🌍 ODS 9</a>
<a onclick="showPage('contato')">📲 Contatos</a>
</div>

<!-- DASHBOARD -->
<div id="home" class="page active">

<h2>Dashboard</h2>

<div class="slider">
  <div class="slide active">🚀 NEXUS SYSTEM</div>
  <div class="slide">📡 Monitoramento Inteligente</div>
  <div class="slide">💻 Infraestrutura TI</div>

  <div class="nav">
    <span onclick="prev()">‹</span>
    <span onclick="next()">›</span>
  </div>

  <div class="dots">
    <span onclick="go(0)" class="active"></span>
    <span onclick="go(1)"></span>
    <span onclick="go(2)"></span>
  </div>
</div>

<div class="cards">
  <div class="card">🧾 Chamados<br><b id="totalChamados">0</b></div>
  <div class="card">⚡ Em andamento<br><b id="andamento">0</b></div>
  <div class="card">✅ Resolvidos<br><b id="resolvidos">0</b></div>
</div>

</div>

<!-- SUPORTE -->
<div id="support" class="page">
<h2>Suporte</h2>

<div class="suporte-card">
<input id="nomeChamado" placeholder="Nome">
<textarea id="msgChamado" placeholder="Problema"></textarea>
<button onclick="criarChamado()">Abrir Chamado</button>
</div>

<div id="listaChamados" class="chamados-container"></div>
</div>

<!-- CONTATOS -->
<div id="contato" class="page">
<h2>Contatos</h2>

<div class="social-cards">

<div class="social-card">
<i class="fab fa-linkedin"></i>
<div><b>LinkedIn</b><br>Perfil profissional</div>
</div>

<div class="social-card">
<i class="fab fa-github"></i>
<div><b>GitHub</b><br>Projetos</div>
</div>

</div>
</div>

<!-- FLOAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>
<a class="whats">📱</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"xxx",
authDomain:"xxx",
projectId:"chamados-17bc3"
});

const db=firebase.firestore();

/* PAGES */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* SLIDER */
let current=0;
const slides=document.querySelectorAll(".slide");

function update(){
slides.forEach(s=>s.classList.remove("active"));
slides[current].classList.add("active");
}

function next(){
current=(current+1)%slides.length;
update();
}

function prev(){
current=(current-1+slides.length)%slides.length;
update();
}

function go(i){
current=i;
update();
}

/* CHAMADO */
function criarChamado(){
let nome=document.getElementById("nomeChamado").value;
let msg=document.getElementById("msgChamado").value;

if(!nome||!msg)return;

db.collection("chamados").add({
nome,
mensagem:msg,
status:"aberto",
data:firebase.firestore.FieldValue.serverTimestamp()
});

document.getElementById("msgChamado").value="";
}

/* TEMPO REAL (1 SÓ VEZ) */
db.collection("chamados").orderBy("data","desc")
.onSnapshot(snap=>{

let total=0,aberto=0,res=0;
let lista=document.getElementById("listaChamados");
lista.innerHTML="";

snap.forEach(d=>{
let x=d.data();
total++;
if(x.status==="aberto")aberto++;
if(x.status==="resolvido")res++;

lista.innerHTML+=`
<div class="chamado-card">
<b>${x.nome}</b><br>${x.mensagem}
</div>`;
});

document.getElementById("totalChamados").innerText=total;
document.getElementById("andamento").innerText=aberto;
document.getElementById("resolvidos").innerText=res;

});

</script>

</body>
</html>
