<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI Pro | Dashboard Seguro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

:root{
--bg:#070b14;
--panel:#0b1220;
--panel2:#0f1a2b;
--text:#d6e2f0;
--muted:#93a4b8;
--accent:#22c55e;
--accent2:#3b82f6;
--border:rgba(255,255,255,0.06);
}

body{
background: radial-gradient(1200px 600px at 20% 0%, #0b1a2e 0%, var(--bg) 50%, #05070d 100%);
color:var(--text);
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;
height:100vh;
width:230px;
background:linear-gradient(180deg,var(--panel),#070b14);
border-right:1px solid var(--border);
padding:22px;
}

.sidebar h2{
color:var(--accent2);
margin-bottom:25px;
letter-spacing:1px;
font-weight:600;
}

.sidebar a{
display:block;
margin:16px 0;
color:var(--muted);
text-decoration:none;
font-size:14px;
transition:0.3s;
}

.sidebar a:hover{
color:var(--text);
transform:translateX(4px);
}

.sidebar i{
margin-right:8px;
color:var(--accent2);
}

/* CONTENT */
.content{
margin-left:230px;
padding:25px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
background:rgba(255,255,255,0.02);
padding:18px;
border:1px solid var(--border);
border-radius:12px;
backdrop-filter:blur(10px);
}

.topbar h1{
font-size:18px;
font-weight:600;
}

.topbar p{
font-size:12px;
color:var(--muted);
}

.topbar button{
background:linear-gradient(90deg,var(--accent2),#2563eb);
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:500;
transition:0.3s;
box-shadow:0 0 20px rgba(59,130,246,0.15);
}

.topbar button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(59,130,246,0.25);
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:linear-gradient(180deg,var(--panel2),rgba(255,255,255,0.02));
border:1px solid var(--border);
padding:22px;
border-radius:14px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(59,130,246,0.3);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card i{
font-size:22px;
color:var(--accent);
margin-bottom:10px;
}

.card h3{
font-size:15px;
margin-bottom:5px;
}

.card p{
font-size:13px;
color:var(--muted);
}

/* INDICADOR DE SEGURANÇA */
.security-bar{
margin-top:30px;
background:var(--panel2);
padding:18px;
border-radius:12px;
border:1px solid var(--border);
}

.bar{
background:#111827;
height:8px;
border-radius:10px;
overflow:hidden;
}

.bar div{
height:100%;
background:linear-gradient(90deg,var(--accent),#16a34a);
}

/* MOBILE */
@media(max-width:768px){
.sidebar{width:90px;}
.content{margin-left:90px;}
.sidebar a{font-size:11px;}
.sidebar h2{font-size:13px;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>TI•SEC</h2>
<a href="#"><i class="fas fa-shield"></i> Painel</a>
<a href="#"><i class="fas fa-chart-line"></i> Monitoramento</a>
<a href="#"><i class="fas fa-server"></i> Servidores</a>
<a href="#"><i class="fas fa-user-lock"></i> Acessos</a>
</div>

<!-- CONTENT -->
<div class="content">

<div class="topbar">
<div>
<h1>Sistema de Segurança TI</h1>
<p>Monitoramento e controle de infraestrutura</p>
</div>

<button onclick="alert('Login administrativo')">
<i class="fas fa-lock"></i> Acesso
</button>
</div>

<div class="cards">

<div class="card">
<i class="fas fa-shield-halved"></i>
<h3>Segurança</h3>
<p>Sistema protegido</p>
</div>

<div class="card">
<i class="fas fa-server"></i>
<h3>Servidores</h3>
<p>Estabilidade 99.9%</p>
</div>

<div class="card">
<i class="fas fa-network-wired"></i>
<h3>Rede</h3>
<p>Tráfego monitorado</p>
</div>

<div class="card">
<i class="fas fa-user-shield"></i>
<h3>Acessos</h3>
<p>Controle ativo</p>
</div>

</div>

<div class="security-bar">
<h3>Índice de Segurança</h3>
<p style="color:var(--muted);font-size:12px">Monitoramento em tempo real</p>
<div class="bar"><div style="width:92%"></div></div>
</div>

</div>

</body>
</html>
