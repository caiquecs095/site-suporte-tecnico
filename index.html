<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus SaaS TI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 SUA CONFIG REAL */
const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "nexus-saas-54337.firebaseapp.com",
projectId: "nexus-saas-54337",
appId: "1:31279431377:web:1c70f4fa42253a7f824ff0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* ================= UI ================= */
window.login = async () => {
try {
await signInWithEmailAndPassword(auth, email.value, pass.value);
} catch (e) {
alert(e.message);
}
};

window.register = async () => {
try {
await createUserWithEmailAndPassword(auth, email.value, pass.value);
alert("Conta criada!");
} catch (e) {
alert(e.message);
}
};

window.logout = () => signOut(auth);

window.createTicket = async () => {
if (!user) return;

await addDoc(collection(db, "tickets"), {
user: user.email,
title: title.value,
desc: desc.value,
status: "ABERTO",
created: Date.now()
});
};

/* ================= AUTH ================= */
onAuthStateChanged(auth, (u) => {
user = u;

if (user) {
loginBox.style.display = "none";
app.style.display = "block";
loadTickets();
} else {
loginBox.style.display = "flex";
app.style.display = "none";
}
});

/* ================= LOAD ================= */
function loadTickets() {
onSnapshot(collection(db, "tickets"), (snap) => {
tickets.innerHTML = "";

snap.forEach(doc => {
let t = doc.data();

tickets.innerHTML += `
<div style="background:#0f172a;padding:10px;margin:10px;border-radius:8px">
<b>${t.user}</b><br>
${t.title}<br>
${t.desc}<br>
<span>${t.status}</span>
</div>
`;
});
});
}

</script>

<style>
body{margin:0;font-family:Poppins;background:#0b1220;color:white}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px}
button{padding:10px;background:#3b82f6;color:white;border:none;cursor:pointer}
#loginBox,#app{padding:20px}
#app{display:none}
</style>

</head>

<body>

<div id="loginBox">
<h2>Login SaaS</h2>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="senha">

<button onclick="login()">Login</button>
<button onclick="register()">Criar Conta</button>
</div>

<div id="app">

<h2>Dashboard</h2>

<button onclick="logout()">Sair</button>

<h3>Novo Ticket</h3>
<input id="title" placeholder="titulo">
<textarea id="desc"></textarea>

<button onclick="createTicket()">Enviar</button>

<h3>Tickets</h3>
<div id="tickets"></div>

</div>

</body>
</html>
