<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE 3.0 | Global System Simulator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050814;
color:#d6e2f0;
overflow:hidden;
}

/* ================= INTRO ================= */
.intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.intro.hidden{display:none;}

.intro-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.intro-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-box{
position:relative;
z-index:2;
text-align:center;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#3b82f6;
color:white;
}

/* ================= LOGIN ================= */
.secure-access{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
z-index:9999;
backdrop-filter:blur(10px);
}

.secure-access.active{
display:flex;
}

.login-box{
background:#0b1220;
padding:25px;
border-radius:12px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
outline:none;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:none;
height:100vh;
}

.dashboard.active{
display:flex;
}

/* ================= MAPA GLOBAL ================= */
#map{
flex:2;
position:relative;
background:radial-gradient(circle at center,#0b1a2e,#050814);
overflow:hidden;
}

/* pontos */
.node{
position:absolute;
width:6px;
height:6px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 10px #22c55e;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(2);opacity:0.5}
100%{transform:scale(1);opacity:1}
}

/* ataques */
.attack{
position:absolute;
height:2px;
background:linear-gradient(90deg,transparent,#3b82f6,transparent);
animation:move 2s linear;
}

@keyframes move{
0%{transform:translateX(-200px);opacity:0}
50%{opacity:1}
100%{transform:translateX(600px);opacity:0}
}

/* ================= PAINEL ================= */
.panel{
flex:1;
background:#0b1220;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
border-left:1px solid rgba(255,255,255,0.1);
}

.box{
background:#0f1a2b;
padding:10px;
border-radius:8px;
font-size:13px;
}

.logs{
flex:1;
overflow:auto;
background:#070b14;
padding:10px;
border-radius:8px;
font-size:12px;
}

.ai{
background:#0f1a2b;
padding:10px;
border-radius:8px;
font-size:12px;
color:#93a4b8;
}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div class="intro" id="intro">

<video class="intro-video" autoplay muted loop>
<source src="intro.mp4" type="video/mp4">
</video>

<div class="intro-overlay"></div>

<div class="intro-box">
<h1>NEXUS CORE 3.0</h1>
<p>Global Infrastructure Simulation System</p>
<button class="btn" onclick="openLogin()">Secure Access</button>
</div>

</div>

<!-- ================= LOGIN ================= -->
<div class="secure-access" id="login" onclick="outside(event)">

<div class="login-box" onclick="event.stopPropagation()">

<h3>SECURE LOGIN</h3>

<input type="text" placeholder="User ID">
<input type="password" placeholder="Password">

<button class="btn" onclick="enterSystem()">ENTER SYSTEM</button>

</div>

</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard" id="dashboard">

<!-- MAPA -->
<div id="map"></div>

<!-- PAINEL -->
<div class="panel">

<h3>GLOBAL SYSTEM STATUS</h3>

<div class="box">Nodes Online: <span id="nodes">1284</span></div>
<div class="box">Threat Level: <span style="color:#22c55e">LOW</span></div>
<div class="box">Latency: 11ms</div>

<div class="ai" id="ai">AI CORE: Initializing...</div>

<div class="logs" id="logs"></div>

</div>

</div>

<script>

/* ================= LOGIN FLOW ================= */
function openLogin(){
document.getElementById("login").classList.add("active");
}

function outside(){
document.getElementById("login").classList.remove("active");
}

function enterSystem(){

document.getElementById("intro").classList.add("hidden");
document.getElementById("login").classList.remove("active");
document.getElementById("dashboard").classList.add("active");

startSimulation();
}

/* ================= MAP INIT ================= */
const map = document.getElementById("map");

function createNodes(){
for(let i=0;i<30;i++){
let n=document.createElement("div");
n.className="node";
n.style.left=Math.random()*window.innerWidth*0.6+"px";
n.style.top=Math.random()*window.innerHeight+"px";
map.appendChild(n);
}
}

createNodes();

/* ================= SIMULATION ================= */
const logs = document.getElementById("logs");
const ai = document.getElementById("ai");
const nodes = document.getElementById("nodes");

const aiMsgs = [
"Scanning global network...",
"Firewall integrity stable.",
"Monitoring dark traffic routes...",
"All systems synchronized.",
"Threat neutralized in sector EU-3",
"Quantum routing optimized."
];

let aiIndex=0;

function addLog(text){
let div=document.createElement("div");
div.textContent="> "+text;
logs.prepend(div);
}

function attack(){
let a=document.createElement("div");
a.className="attack";
a.style.top=Math.random()*window.innerHeight+"px";
a.style.width=(200+Math.random()*300)+"px";
map.appendChild(a);

setTimeout(()=>a.remove(),2000);
}

/* ================= MAIN LOOP ================= */
function startSimulation(){

setInterval(()=>{

attack();

addLog("Inbound connection detected and blocked");

nodes.textContent=1200+Math.floor(Math.random()*200);

ai.textContent="AI CORE: "+aiMsgs[aiIndex];
aiIndex=(aiIndex+1)%aiMsgs.length;

},1200);

}

</script>

</body>
</html>
