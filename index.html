<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Support | SaaS TI Real</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0b1220;color:#e5edf7;}

/* HEADER */
header{
background:#0f172a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* CONTAINER */
.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

/* CARD */
.card{
background:#0f172a;
padding:15px;
margin-top:10px;
border-radius:10px;
}

/* INPUT */
input, textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
}

.box{
background:#0f172a;
padding:20px;
border-radius:12px;
width:320px;
}

.hidden{display:none;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:14px;
border-radius:50px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h2>Nexus Support SaaS</h2>

<button id="authBtn" onclick="toggleAuth()">Login</button>
</header>

<!-- LOGIN -->
<div id="loginBox" class="login">

<div class="box">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()" style="margin-top:10px;background:#22c55e;">Criar Conta</button>

</div>

</div>

<!-- APP -->
<div id="app" class="container hidden">

<h3>Bem-vindo <span id="user"></span></h3>

<h3>Abrir Chamado</h3>

<input id="title" placeholder="Título">
<textarea id="desc"></textarea>

<button onclick="createTicket()">Enviar</button>

<h3>Meus Chamados</h3>
<div id="tickets"></div>

</div>

<a class="whatsapp" href="https://wa.me/5521981048950" target="_blank">
💬 SAC
</a>

<script>

/* FIREBASE CONFIG (SUBSTITUIR PELO SEU) */
const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_PROJETO.firebaseapp.com",
projectId: "SEU_PROJETO",
storageBucket: "SEU_PROJETO.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* LOGIN PERSISTENTE */
auth.onAuthStateChanged(user=>{
if(user){
currentUser = user;
loginBox.classList.add("hidden");
app.classList.remove("hidden");
authBtn.innerText = "Logoff";
userSpan.innerText = user.email;
loadTickets();
}else{
app.classList.add("hidden");
loginBox.classList.remove("hidden");
authBtn.innerText = "Login";
}
});

/* TOGGLE LOGIN */
function toggleAuth(){
if(currentUser){
auth.signOut();
}else{
loginBox.classList.remove("hidden");
}
}

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(email.value, pass.value);
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, pass.value);
}

/* LOGOUT */
function logout(){
auth.signOut();
}

/* CREATE TICKET */
function createTicket(){

db.collection("tickets").add({
user:currentUser.email,
title:title.value,
desc:desc.value,
date:Date.now()
});

loadTickets();
}

/* LOAD TICKETS */
function loadTickets(){

let box = document.getElementById("tickets");
box.innerHTML="";

db.collection("tickets")
.where("user","==",currentUser.email)
.get()
.then(snapshot=>{
snapshot.forEach(doc=>{
let d = doc.data();

box.innerHTML += `
<div class="card">
<b>${d.title}</b>
<p>${d.desc}</p>
</div>`;
});
});

}

</script>

</body>
</html>
