<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SYSTEM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================
   RESET
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050814;
color:#d6e2f0;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#0b1220;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid #1e293b;
}

.sidebar h2{color:#3b82f6;}

.sidebar a{
cursor:pointer;
padding:8px;
border-radius:5px;
transition:0.3s;
}

.sidebar a:hover{
background:#1e293b;
}

/* =========================
   PAGES
========================= */
.page{
display:none;
margin-left:220px;
padding:20px;
}

.page.active{
display:block;
}

/* =========================
   DASHBOARD
========================= */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#0b1220;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card b{
font-size:22px;
color:#3b82f6;
}

/* =========================
   SUPORTE
========================= */
.suporte-card{
background:#0b1220;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}

.suporte-card input,
.suporte-card textarea{
padding:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:#fff;
outline:none;
}

.suporte-card textarea{
min-height:100px;
resize:none;
}

.suporte-card button{
background:#3b82f6;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.suporte-card button:hover{
background:#2563eb;
}

/* =========================
   CHAMADOS
========================= */
.chamados-container{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.chamado-card{
background:#0b1220;
border:1px solid #1e293b;
padding:15px;
border-radius:10px;
transition:0.3s;
}

.chamado-card:hover{
transform:translateY(-3px);
}

.chamado-header{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.chamado-nome{
color:#3b82f6;
font-weight:bold;
}

.status{
font-size:12px;
padding:3px 8px;
border-radius:20px;
}

.aberto{background:#f59e0b;color:#000;}
.resolvido{background:#10b981;color:#000;}

/* =========================
   CHAT BOTÃO FLUTUANTE
========================= */
.chat-btn{
position:fixed;
bottom:80px;
right:20px;
background:#3b82f6;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
z-index:999;
}

/* =========================
   WHATSAPP
========================= */
.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>NEXUS</h2>
<a onclick="showPage('home')">🏠 Dashboard</a>
<a onclick="showPage('system')">🖥 Sistema</a>
<a onclick="showPage('support')">💬 Suporte</a>
<a onclick="showPage('about')">📄 Sobre</a>
</div>

<!-- DASHBOARD -->
<div id="home" class="page active">
<h2>🏠 Dashboard</h2>

<div class="cards">
  <div class="card">🧾 Chamados<br><b id="totalChamados">0</b></div>
  <div class="card">⚡ Em andamento<br><b id="andamento">0</b></div>
  <div class="card">✅ Resolvidos<br><b id="resolvidos">0</b></div>
</div>
</div>

<!-- SISTEMA -->
<div id="system" class="page">
<h2>🖥 Sistema</h2>
<p>Gestão de infraestrutura e suporte técnico.</p>
</div>

<!-- SUPORTE -->
<div id="support" class="page">
<h2>💬 Suporte</h2>

<div class="suporte-card">
<input id="nomeChamado" placeholder="Seu nome">
<textarea id="msgChamado" placeholder="Descreva o problema"></textarea>
<button onclick="criarChamado()">🚀 Abrir Chamado</button>
</div>

<h3 style="margin-top:20px;">📋 Chamados</h3>
<div id="listaChamados" class="chamados-container"></div>
</div>

<!-- SOBRE -->
<div id="about" class="page">
<h2>📄 Sobre</h2>
<p>Sistema NEXUS de suporte técnico.</p>
</div>

<!-- BOTÃO FLUTUANTE -->
<div class="chat-btn" onclick="alert('Chat aberto')">💬</div>

<a class="whats" href="https://wa.me/5521981048650" target="_blank">📱</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC0P6CwncDoEQnW8Yd",
  authDomain: "chamados-17bc3.firebaseapp.com",
  projectId: "chamados-17bc3",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   NAV
========================= */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});
document.getElementById(id).classList.add("active");
}

/* =========================
   CRIAR CHAMADO
========================= */
function criarChamado(){

let nome = document.getElementById("nomeChamado").value;
let msg = document.getElementById("msgChamado").value;

if(!nome || !msg) return;

db.collection("chamados").add({
nome,
mensagem:msg,
status:"aberto",
data:firebase.firestore.FieldValue.serverTimestamp()
});

document.getElementById("msgChamado").value="";
}

/* =========================
   TEMPO REAL
========================= */
db.collection("chamados").orderBy("data","desc")
.onSnapshot(snapshot=>{

let total=0;
let andamento=0;
let resolvidos=0;

const lista = document.getElementById("listaChamados");
lista.innerHTML="";

snapshot.forEach(doc=>{
let d = doc.data();

total++;

if(d.status==="aberto")andamento++;
if(d.status==="resolvido")resolvidos++;

lista.innerHTML += `
<div class="chamado-card">

<div class="chamado-header">
<span class="chamado-nome">👤 ${d.nome}</span>
<span class="status ${d.status}">${d.status}</span>
</div>

<div>${d.mensagem}</div>

</div>
`;
});

document.getElementById("totalChamados").innerText=total;
document.getElementById("andamento").innerText=andamento;
document.getElementById("resolvidos").innerText=resolvidos;

});

</script>

</body>
</html>
