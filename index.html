<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Enterprise TI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050814;
color:#e5edf7;
overflow:hidden;
}

/* ================= INTRO ================= */
.intro{
position:fixed;
inset:0;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

.intro video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.4);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-box{
position:relative;
z-index:2;
text-align:center;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#3b82f6;
color:white;
margin-top:15px;
}

/* ================= LOGIN ================= */
.login{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
z-index:9999;
}

.login.active{
display:flex;
}

.login-box{
background:#0b1220;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0f1a2b;
color:white;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:none;
height:100vh;
padding:20px;
}

.dashboard.active{
display:block;
}

/* ================= SLIDER ================= */
.slider{
position:relative;
height:300px;
margin-top:20px;
overflow:hidden;
border-radius:12px;
background:#0b1220;
}

.slide{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#334155;
cursor:pointer;
}

.dot.active{
background:#3b82f6;
}

/* ================= CARDS ================= */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#0b1220;
padding:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.06);
}

</style>

</head>

<body>

<!-- ================= INTRO ================= -->
<div class="intro" id="intro">

<video autoplay muted loop>
<source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="intro-box">
<h1>NEXUS CORE</h1>
<p>Enterprise Infrastructure System</p>
<button class="btn" onclick="openLogin()">Secure Access</button>
</div>

</div>

<!-- ================= LOGIN ================= -->
<div class="login" id="login">

<div class="login-box">

<h3>Admin Access</h3>

<input type="text" placeholder="ADM_USER">
<input type="password" placeholder="Password">

<button class="btn" onclick="enter()">Login ADM</button>

</div>

</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard" id="dashboard">

<h2>Control Panel</h2>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<h2>Infraestrutura Global</h2>
<p>Monitoramento em tempo real</p>
</div>

<div class="slide">
<h2>Segurança Ativa</h2>
<p>Sistemas protegidos 24/7</p>
</div>

<div class="slide">
<h2>Cloud Systems</h2>
<p>Alta performance enterprise</p>
</div>

<!-- DOTS -->
<div class="dots">
<div class="dot active" onclick="go(0)"></div>
<div class="dot" onclick="go(1)"></div>
<div class="dot" onclick="go(2)"></div>
</div>

</div>

<!-- CARDS -->
<div class="grid">

<div class="card">Nodes: 1.284</div>
<div class="card">Latency: 11ms</div>
<div class="card">Security: MAX</div>

</div>

</div>

<script>

/* ================= LOGIN ================= */
function openLogin(){
document.getElementById("login").classList.add("active");
}

function enter(){
document.getElementById("intro").style.display="none";
document.getElementById("login").classList.remove("active");
document.getElementById("dashboard").classList.add("active");
}

/* ================= SLIDER ================= */
let slides = document.querySelectorAll(".slide");
let dots = document.querySelectorAll(".dot");
let i = 0;

function show(n){
slides.forEach(s=>s.classList.remove("active"));
dots.forEach(d=>d.classList.remove("active"));

slides[n].classList.add("active");
dots[n].classList.add("active");

i = n;
}

function go(n){
show(n);
}

/* AUTO SLIDE */
setInterval(()=>{
i = (i+1)%slides.length;
show(i);
},4000);

</script>

</body>
</html>
