<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Global System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050814;
color:#d6e2f0;
overflow:hidden;
}

/* ================= INTRO ================= */
.intro{
position:fixed;
inset:0;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

.intro-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.intro-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.intro-box{
position:relative;
z-index:2;
text-align:center;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#3b82f6;
color:white;
}

/* ================= LOGIN ================= */
.secure-access{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
z-index:9999;
backdrop-filter:blur(8px);
}

.secure-access.active{
display:flex;
}

.login-box{
background:#0b1220;
padding:25px;
border-radius:10px;
width:300px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
outline:none;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:none;
padding:20px;
}

.card{
background:#0b1220;
padding:15px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div class="intro" id="intro">

<video class="intro-video" autoplay muted loop>
<source src="intro.mp4" type="video/mp4">
</video>

<div class="intro-overlay"></div>

<div class="intro-box">
<h1>NEXUS CORE</h1>
<p>Global Infrastructure System</p>
<button class="btn" onclick="openLogin()">Secure Access</button>
</div>

</div>

<!-- ================= LOGIN ================= -->
<div class="secure-access" id="login">

<div class="login-box">
<h3>SECURE LOGIN</h3>

<input type="text" placeholder="User ID">
<input type="password" placeholder="Password">

<button class="btn" onclick="enterSystem()">Login</button>

</div>

</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard" id="dashboard">

<h2>System Dashboard</h2>

<div class="card">Status: ONLINE</div>
<div class="card">Nodes: 1.284</div>
<div class="card">Security: MAXIMUM</div>

</div>

<script>

function openLogin(){
document.getElementById("login").classList.add("active");
}

function enterSystem(){
document.getElementById("intro").style.display="none";
document.getElementById("login").classList.remove("active");
document.getElementById("dashboard").style.display="block";
}

/* segurança extra contra bug de overlay preso */
document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
document.getElementById("login").classList.remove("active");
}
});

</script>

</body>
</html>
