<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus SaaS TI - Base</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "nexus-saas-54337.firebaseapp.com",
  projectId: "nexus-saas-54337",
  appId: "1:31279431377:web:1c70f4fa42253a7f824ff0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= USER FIXO (SEM LOGIN) ================= */
const user = {
  email: "admin@nexus.local"
};

/* ================= CRIAR TICKET ================= */
window.createTicket = async () => {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (!title || !desc) {
    alert("Preencha todos os campos");
    return;
  }

  await addDoc(collection(db, "tickets"), {
    user: user.email,
    title,
    desc,
    status: "ABERTO",
    created: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
};

/* ================= CARREGAR TICKETS ================= */
function loadTickets() {
  onSnapshot(collection(db, "tickets"), (snap) => {
    const box = document.getElementById("tickets");
    box.innerHTML = "";

    snap.forEach(doc => {
      const t = doc.data();

      box.innerHTML += `
        <div class="card">
          <b>${t.user}</b>
          <h4>${t.title}</h4>
          <p>${t.desc}</p>
          <span class="status">${t.status}</span>
        </div>
      `;
    });
  });
}

window.onload = loadTickets;

</script>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0b1220;
  color:white;
}

.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  outline:none;
  background:#111827;
  color:white;
}

button{
  padding:12px 16px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#2563eb;
}

.card{
  background:#0f172a;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #1e293b;
}

.status{
  display:inline-block;
  margin-top:8px;
  padding:4px 8px;
  background:#22c55e;
  border-radius:6px;
  font-size:12px;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Nexus SaaS TI - Dashboard</h2>

<h3>Novo Ticket</h3>

<input id="title" placeholder="Título do ticket">
<textarea id="desc" placeholder="Descrição"></textarea>

<button onclick="createTicket()">Criar Ticket</button>

<h3 style="margin-top:30px">📌 Tickets</h3>
<div id="tickets"></div>

</div>

</body>
</html>
