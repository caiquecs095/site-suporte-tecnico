<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SYSTEM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050814;
color:#d6e2f0;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;
width:200px;height:100%;
background:#0b1220;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid #1e293b;
}

.sidebar h2{color:#3b82f6;}

.sidebar a{
cursor:pointer;
padding:8px;
border-radius:5px;
text-decoration:none;
color:#fff;
}

.sidebar a:hover{
background:#1e293b;
}

/* PAGES */
.page{
display:none;
margin-left:220px;
padding:20px;
}

.page.active{
display:block;
}

/* SLIDER */
.slider{
height:260px;
background:#0b1220;
position:relative;
border-radius:10px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:.5s;
font-size:22px;
}

.slide.active{opacity:1;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:10px;
}

.card.saas{
background:#0b1220;
padding:15px;
border-radius:10px;
}

/* TAGS */
.tag{
padding:3px 8px;
border-radius:20px;
font-size:11px;
text-transform:uppercase;
}

.tag.bug{background:#ef4444;color:#fff;}
.tag.suporte{background:#3b82f6;color:#fff;}
.tag.financeiro{background:#f59e0b;color:#000;}

/* CONTATOS (CORRIGIDO) */
.social-cards{
display:flex;
flex-direction:column;
gap:15px;
}

.social-card{
background:#0b1220;
border:1px solid #1e293b;
padding:15px;
border-radius:12px;
display:flex;
gap:10px;
text-decoration:none;
color:#fff;
transition:.3s;
}

.social-card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px rgba(59,130,246,0.5);
}

/* CHAT */
.chat-box{
position:fixed;
bottom:150px;
right:20px;
width:300px;
height:400px;
background:#0b1220;
border:1px solid #1e293b;
border-radius:12px;
display:none;
flex-direction:column;
z-index:9999;
}

.chat-messages{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.chat-msg{
max-width:80%;
display:flex;
gap:8px;
}

.msg-content{
padding:10px;
border-radius:10px;
background:#1e293b;
}

.chat-msg.me .msg-content{
background:#3b82f6;
}

.avatar{
width:25px;
height:25px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
}

/* FLOAT */
.chat-btn{
position:fixed;
bottom:80px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
z-index:99999;
}

.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:#fff;
text-decoration:none;
z-index:99999;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>NEXUS</h2>
<a onclick="showPage('home')">🏠 Dashboard</a>
<a onclick="showPage('support')">💬 Suporte</a>
<a onclick="showPage('contato')">📲 Contatos</a>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h2>Dashboard</h2>
<div class="slider">
  <div class="slide active">🚀 NEXUS SYSTEM</div>
  <div class="slide">📡 Monitoramento</div>
</div>
</div>

<!-- SUPORTE -->
<div id="support" class="page">
<h2>Suporte</h2>

<input id="nomeChamado" placeholder="Nome">
<input id="assuntoChamado" placeholder="Assunto">
<textarea id="msgChamado" placeholder="Problema"></textarea>
<button onclick="criarChamado()">Abrir Chamado</button>

<h3>Chamados</h3>
<div id="listaChamados"></div>
</div>

<!-- CONTATOS (CORRIGIDO) -->
<div id="contato" class="page">
<h2>Contatos</h2>

<div class="social-cards">

<a class="social-card" href="https://linkedin.com" target="_blank">
<i class="fab fa-linkedin"></i>
<div>
<b>LinkedIn</b><br>Perfil profissional
</div>
</a>

<a class="social-card" href="https://github.com" target="_blank">
<i class="fab fa-github"></i>
<div>
<b>GitHub</b><br>Projetos
</div>
</a>

</div>
</div>

<!-- CHAT -->
<div id="chatBox" class="chat-box">

<div class="chat-messages" id="chatMessages"></div>

<input id="chatNome" placeholder="Nome">
<input id="chatMsg" placeholder="Mensagem">
<button onclick="sendChat()">Enviar</button>

</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>
<a class="whats">📱</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"xxx",
authDomain:"xxx",
projectId:"chamados-17bc3"
});

const db = firebase.firestore();

const sessionId = localStorage.getItem("sid") || crypto.randomUUID();
localStorage.setItem("sid", sessionId);

/* NAV */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CHAMADOS */
function criarChamado(){

db.collection("chamados").add({
nome:document.getElementById("nomeChamado").value,
assunto:document.getElementById("assuntoChamado").value,
mensagem:document.getElementById("msgChamado").value,
categoria:"suporte",
data:firebase.firestore.FieldValue.serverTimestamp()
});

}

/* LISTA */
db.collection("chamados").onSnapshot(snap=>{
const el=document.getElementById("listaChamados");
if(!el) return;

el.innerHTML="";

snap.forEach(d=>{
const x=d.data();

el.innerHTML+=`
<div class="card saas">
<b>${x.nome}</b><br>
${x.assunto}<br>
<span class="tag suporte">suporte</span><br>
${x.mensagem}
</div>`;
});

});

/* CHAT */
function toggleChat(){
const box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function sendChat(){

const nome=document.getElementById("chatNome").value;
const msg=document.getElementById("chatMsg").value;

db.collection("chat").add({
nome,
mensagem:msg,
sessionId,
data:firebase.firestore.FieldValue.serverTimestamp()
});

document.getElementById("chatMsg").value="";

}

/* CHAT REALTIME */
db.collection("chat").orderBy("data").onSnapshot(snap=>{
const box=document.getElementById("chatMessages");
box.innerHTML="";

snap.forEach(d=>{
const x=d.data();

if(x.sessionId!==sessionId) return;

box.innerHTML+=`
<div class="chat-msg">
<div class="avatar">${x.nome[0]}</div>
<div class="msg-content">${x.mensagem}</div>
</div>`;
});

});

</script>

</body>
</html>
