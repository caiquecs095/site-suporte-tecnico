<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI Pro | Dashboard Seguro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

:root{
--bg:#070b14;
--panel:#0b1220;
--panel2:#0f1a2b;
--text:#d6e2f0;
--muted:#93a4b8;
--accent:#22c55e;
--accent2:#3b82f6;
--border:rgba(255,255,255,0.06);
}

body{
background: radial-gradient(1200px 600px at 20% 0%, #0b1a2e 0%, var(--bg) 50%, #05070d 100%);
color:var(--text);
overflow-x:hidden;
}

/* LOGIN */
.login{
position:fixed;
top:0;left:0;
width:100%;height:100vh;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
background:var(--panel);
padding:30px;
border-radius:14px;
width:300px;
border:1px solid var(--border);
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
background:#0f1a2b;
color:white;
}

.login-box button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,var(--accent2),#2563eb);
color:white;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;
height:100vh;
width:230px;
background:linear-gradient(180deg,var(--panel),#070b14);
border-right:1px solid var(--border);
padding:22px;
}

.sidebar h2{
color:var(--accent2);
margin-bottom:25px;
}

.sidebar a{
display:block;
margin:16px 0;
color:var(--muted);
text-decoration:none;
font-size:14px;
}

.sidebar a:hover{
color:white;
}

.sidebar i{margin-right:8px;color:var(--accent2);}

/* CONTENT */
.content{
margin-left:230px;
padding:25px;
display:none;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
background:rgba(255,255,255,0.02);
padding:18px;
border:1px solid var(--border);
border-radius:12px;
}

.topbar button{
background:linear-gradient(90deg,var(--accent2),#2563eb);
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:linear-gradient(180deg,var(--panel2),rgba(255,255,255,0.02));
border:1px solid var(--border);
padding:22px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(59,130,246,0.4);
}

.card i{
font-size:22px;
color:var(--accent);
margin-bottom:10px;
}

.card p{color:var(--muted);font-size:13px;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h3>Login Administrativo</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">Acessar Sistema</button>
<p style="font-size:11px;color:#93a4b8;margin-top:10px">Admin: admin / 1234</p>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>TI•SEC</h2>
<a href="#"><i class="fas fa-shield"></i> Painel</a>
<a href="#"><i class="fas fa-chart-line"></i> Monitoramento</a>
<a href="#"><i class="fas fa-server"></i> Servidores</a>
<a href="#"><i class="fas fa-user-lock"></i> Acessos</a>
</div>

<!-- CONTENT -->
<div class="content" id="content">

<div class="topbar">
<div>
<h1>Sistema de Segurança TI</h1>
<p>Monitoramento em tempo real</p>
</div>

<button onclick="alert('Área administrativa')">
<i class="fas fa-lock"></i> Admin
</button>
</div>

<div class="cards">

<div class="card" onclick="alert('Abrindo Segurança')">
<i class="fas fa-shield-halved"></i>
<h3>Segurança</h3>
<p>Sistema protegido</p>
</div>

<div class="card" onclick="alert('Abrindo Servidores')">
<i class="fas fa-server"></i>
<h3>Servidores</h3>
<p>Estabilidade 99.9%</p>
</div>

<div class="card" onclick="alert('Abrindo Rede')">
<i class="fas fa-network-wired"></i>
<h3>Rede</h3>
<p>Tráfego monitorado</p>
</div>

<div class="card" onclick="alert('Abrindo Acessos')">
<i class="fas fa-user-shield"></i>
<h3>Acessos</h3>
<p>Controle ativo</p>
</div>

</div>

</div>

<script>
function entrar(){
let u=document.getElementById('user').value;
let p=document.getElementById('pass').value;

if(u==='admin' && p==='1234'){
    document.getElementById('login').style.display='none';
    document.getElementById('content').style.display='block';
}else{
    alert('Acesso negado');
}
}
</script>

</body>
</html>
