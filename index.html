<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus CORE | Admin Painel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0b1220;color:#e5edf7;}

/* HEADER */
header{
background:#0f172a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* LAYOUT */
.container{
max-width:1100px;
margin:30px auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-top:10px;
border-left:4px solid #3b82f6;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
}

.box{
background:#0f172a;
padding:20px;
border-radius:12px;
width:340px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0b1220;
color:white;
}

/* STATUS */
.status{
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:inline-block;
}

.aberto{background:#f59e0b;color:black;}
.andamento{background:#3b82f6;}
.resolvido{background:#22c55e;}

.hidden{display:none;}

</style>
</head>

<body>

<header>
<h2>Nexus SaaS Admin</h2>
<button id="authBtn" onclick="toggleAuth()">Login</button>
</header>

<!-- LOGIN -->
<div id="loginBox" class="login">

<div class="box">

<h3>Login SaaS</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()" style="margin-top:10px;background:#22c55e;">Criar Conta</button>

</div>

</div>

<!-- APP -->
<div id="app" class="container hidden">

<h3>Dashboard SaaS</h3>

<div class="grid">

<div class="card">
<h4>Chamados Totais</h4>
<span id="total">0</span>
</div>

<div class="card">
<h4>Usuário Logado</h4>
<span id="userEmail"></span>
</div>

</div>

<h3>Chamados</h3>
<div id="tickets"></div>

</div>

<script>

/* FIREBASE CONFIG (SUBSTITUIR) */
const firebaseConfig = {
apiKey: "SUA_API",
authDomain: "SEU.firebaseapp.com",
projectId: "SEU",
appId: "SEU"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* ADMIN EMAIL FIXO */
const ADMIN_EMAIL = "admin@nexus.com";

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
if(user){
currentUser = user;

loginBox.classList.add("hidden");
app.classList.remove("hidden");
authBtn.innerText = "Logoff";

userEmail.innerText = user.email;

loadTickets();

}else{
app.classList.add("hidden");
loginBox.classList.remove("hidden");
authBtn.innerText = "Login";
}
});

/* TOGGLE */
function toggleAuth(){
if(currentUser){
auth.signOut();
}else{
loginBox.classList.remove("hidden");
}
}

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(email.value, pass.value);
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, pass.value);
}

/* LOAD TICKETS */
function loadTickets(){

let box = document.getElementById("tickets");
box.innerHTML="";

db.collection("tickets").onSnapshot(snapshot=>{

let count = 0;
box.innerHTML="";

snapshot.forEach(doc=>{
let t = doc.data();
count++;

let isAdmin = currentUser.email === ADMIN_EMAIL;

box.innerHTML += `
<div class="card">

<b>${t.user}</b><br>
${t.title}<br>

<span class="status ${t.status.toLowerCase()}">${t.status}</span>

${isAdmin ? `
<br><br>
<select onchange="updateStatus('${doc.id}',this.value)">
<option>ABERTO</option>
<option>ANDAMENTO</option>
<option>RESOLVIDO</option>
</select>
` : ""}

</div>`;
});

total.innerText = count;

});

}

/* UPDATE STATUS */
function updateStatus(id,status){
db.collection("tickets").doc(id).update({status});
}

</script>

</body>
</html>
