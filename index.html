<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE 2.0 | Global System Simulator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#050814;
color:#d6e2f0;
overflow:hidden;
}

/* ===== LAYOUT ===== */
.container{
display:grid;
grid-template-columns: 2fr 1fr;
height:100vh;
}

/* ===== MAPA ===== */
#map{
background: radial-gradient(circle at center,#0b1a2e,#050814);
position:relative;
overflow:hidden;
}

/* pontos globais fake */
.dot{
position:absolute;
width:6px;
height:6px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 10px #22c55e;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(2);opacity:0.5}
100%{transform:scale(1);opacity:1}
}

/* linhas de ataque */
.line{
position:absolute;
height:2px;
background:linear-gradient(90deg,transparent,#3b82f6,transparent);
animation:move 2s linear infinite;
}

@keyframes move{
0%{transform:translateX(-200px);opacity:0}
50%{opacity:1}
100%{transform:translateX(600px);opacity:0}
}

/* ===== PAINEL LATERAL ===== */
.panel{
background:#0b1220;
border-left:1px solid rgba(255,255,255,0.1);
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* status */
.box{
background:#0f1a2b;
padding:10px;
border-radius:8px;
}

/* logs */
.logs{
flex:1;
overflow:auto;
font-size:12px;
background:#070b14;
padding:10px;
border-radius:8px;
}

/* IA console */
.ai{
background:#0f1a2b;
padding:10px;
border-radius:8px;
font-size:12px;
color:#93a4b8;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== MAPA GLOBAL ===== -->
<div id="map"></div>

<!-- ===== PAINEL ===== -->
<div class="panel">

<h3>GLOBAL SYSTEM STATUS</h3>

<div class="box">Nodes Online: <span id="nodes">1284</span></div>
<div class="box">Threat Level: <span style="color:#22c55e">LOW</span></div>
<div class="box">Latency: 12ms</div>

<div class="ai" id="ai">
AI CORE: Initializing systems...
</div>

<div class="logs" id="logs"></div>

</div>

</div>

<script>

/* ===== MAPA DINÂMICO ===== */
const map = document.getElementById("map");

function createDot(){
const dot = document.createElement("div");
dot.className="dot";
dot.style.left = Math.random()*window.innerWidth*0.6 + "px";
dot.style.top = Math.random()*window.innerHeight + "px";
map.appendChild(dot);
}

for(let i=0;i<25;i++) createDot();

/* ===== ATAQUES SIMULADOS ===== */
function attack(){
const line = document.createElement("div");
line.className="line";
line.style.top = Math.random()*window.innerHeight + "px";
line.style.width = Math.random()*300 + 200 + "px";
map.appendChild(line);

setTimeout(()=>line.remove(),2000);
}

/* ===== LOG SYSTEM ===== */
const logs = document.getElementById("logs");

function addLog(msg){
const div = document.createElement("div");
div.textContent = "> " + msg;
logs.prepend(div);
}

/* ===== IA SIMULADA ===== */
const ai = document.getElementById("ai");

const aiMsgs = [
"Scanning global network...",
"All nodes synchronized.",
"Threat detection active.",
"Firewall integrity: 99.8%",
"Monitoring dark traffic routes...",
"System stable."
];

let aiIndex = 0;

/* ===== LOOP SIMULAÇÃO ===== */
setInterval(()=>{
attack();

addLog("Connection traced from unknown node");
document.getElementById("nodes").textContent = 1200 + Math.floor(Math.random()*200);

ai.textContent = "AI CORE: " + aiMsgs[aiIndex];
aiIndex = (aiIndex+1)%aiMsgs.length;

},1200);

</script>

</body>
</html>
