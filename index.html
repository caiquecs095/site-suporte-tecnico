<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Global Operations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

:root{
--bg:#050814;
--panel:#0b1220;
--text:#d6e2f0;
--muted:#93a4b8;
--accent:#22c55e;
--accent2:#3b82f6;
}

body{
background: radial-gradient(circle at top, #0b1a2e, #050814 60%, #020308);
color:var(--text);
overflow:hidden;
}

/* ================= INTRO ================= */
.intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.intro-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.intro-video.active{opacity:1;}

.fallback-bg{
position:absolute;
inset:0;
background: radial-gradient(circle at 30% 20%, #1b2a4a, #050814 70%);
animation: pulse 6s infinite alternate;
}

@keyframes pulse{
0%{filter:brightness(1)}
100%{filter:brightness(1.4)}
}

.intro-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.intro-box{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
}

.intro-box h1{
font-size:34px;
margin-bottom:10px;
}

.intro-box p{
color:var(--muted);
font-size:14px;
margin-bottom:20px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(90deg,var(--accent2),#2563eb);
}

/* ================= SECURE LOGIN ================= */
.secure-access{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
z-index:900;
backdrop-filter:blur(10px);
}

.login-box{
background:var(--panel);
padding:30px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
width:320px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.login-box button{
margin-top:15px;
width:100%;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:none;
padding:20px;
}

.card{
background:var(--panel);
padding:20px;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div class="intro" id="intro">

<div class="fallback-bg"></div>

<video class="intro-video active" id="v1" autoplay muted playsinline>
<source src="intro1.mp4" type="video/mp4">
</video>

<video class="intro-video" id="v2" muted playsinline>
<source src="intro2.mp4" type="video/mp4">
</video>

<div class="intro-overlay"></div>

<div class="intro-box">
<h1>NEXUS CORE</h1>
<p>Global Infrastructure Operations System</p>
<button class="btn" onclick="openLogin()">Enter Secure Access</button>
</div>

</div>

<!-- ================= SECURE LOGIN ================= -->
<div class="secure-access" id="login">
<div class="login-box">
<h3>SECURE ACCESS</h3>
<input type="text" placeholder="User ID">
<input type="password" placeholder="Password">
<button class="btn" onclick="enterSystem()">Authenticate</button>
</div>
</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard" id="dashboard">

<h2>Global Operations Dashboard</h2>

<div class="card">
Status: ONLINE
</div>

<div class="card">
Nodes Active: 1,284
</div>

<div class="card">
Security Level: MAXIMUM
</div>

</div>

<script>
let state = {
introDone:false,
logged:false
};

/* ================= INTRO SEQUENCE ================= */
const videos = [
document.getElementById("v1"),
document.getElementById("v2")
];

let index = 0;

function playSequence(){
videos.forEach(v => v.classList.remove("active"));

videos[index].classList.add("active");
videos[index].play().catch(()=>{});

videos[index].onended = () => {
index++;
if(index < videos.length){
playSequence();
}else{
state.introDone = true;
}
};
}

playSequence();

/* ================= FALLBACK ================= */
setTimeout(()=>{
// se vídeo falhar, ativa fallback automaticamente
if(!state.introDone){
document.querySelector(".fallback-bg").style.display="block";
}
},4000);

/* ================= LOGIN ================= */
function openLogin(){
document.getElementById("login").style.display="flex";
}

function enterSystem(){
state.logged = true;

document.getElementById("intro").style.display="none";
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
}

/* segurança extra: bloquear dashboard sem login */
setInterval(()=>{
if(!state.logged){
document.getElementById("dashboard").style.display="none";
}
},500);
</script>

</body>
</html>
