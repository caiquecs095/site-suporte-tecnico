<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS SYSTEM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#050814;color:#d6e2f0;}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:0;width:200px;height:100%;
background:#0b1220;padding:20px;display:flex;
flex-direction:column;gap:15px;border-right:1px solid #1e293b;
}
.sidebar h2{color:#3b82f6;}
.sidebar a{cursor:pointer;padding:8px;border-radius:5px;}
.sidebar a:hover{background:#1e293b;}

/* PAGES */
.page{display:none;margin-left:220px;padding:20px;}
.page.active{display:block;}

/* SLIDER */
.slider{height:260px;background:#0b1220;position:relative;border-radius:10px;}
.slide{
position:absolute;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
opacity:0;transition:.5s;
}
.slide.active{opacity:1;}

.nav span{
position:absolute;top:50%;transform:translateY(-50%);
font-size:30px;color:#fff;cursor:pointer;
}
.nav span:first-child{left:10px;}
.nav span:last-child{right:10px;}

.dots{
position:absolute;bottom:10px;width:100%;text-align:center;
}
.dots span{
width:10px;height:10px;background:#444;
display:inline-block;border-radius:50%;margin:4px;cursor:pointer;
}
.dots span.active{background:#3b82f6;}

/* DASH */
.cards{display:flex;gap:20px;margin-top:20px;}
.card{
background:#0b1220;padding:20px;border-radius:10px;
border:1px solid #1e293b;
}

/* CHAT */
.chat-btn{
position:fixed;bottom:80px;right:20px;
background:#3b82f6;color:white;padding:15px;border-radius:50%;
cursor:pointer;
}

.chat-box{
position:fixed;bottom:140px;right:20px;width:280px;
background:#0b1220;display:none;flex-direction:column;
border-radius:10px;border:1px solid #1e293b;
}

.chat-header{background:#111827;padding:10px;}
.chat-body{padding:10px;display:flex;flex-direction:column;}
.chat-body input, .chat-body textarea{
margin-bottom:5px;padding:8px;background:#0f172a;color:white;border:none;
}
.chat-body button{
background:#3b82f6;color:white;padding:10px;border:none;cursor:pointer;
}

/* SOCIAL */
.social-cards{display:flex;gap:20px;margin-top:20px;}
.social-card{
background:#0b1220;padding:20px;border-radius:10px;
display:flex;gap:10px;cursor:pointer;
}
.social-card:hover{transform:translateY(-5px);}

/* WHATS */
.whats{
position:fixed;bottom:20px;right:20px;
background:#25D366;padding:15px;border-radius:50%;
color:white;text-decoration:none;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
<h2>NEXUS</h2>
<a onclick="showPage('home')">Dashboard</a>
<a onclick="showPage('system')">Sistema</a>
<a onclick="showPage('support')">Suporte</a>
<a onclick="showPage('about')">Sobre</a>
<a onclick="showPage('course')">Cursos</a>
<a onclick="showPage('ods')">ODS 9</a>
<a onclick="showPage('contato')">Contatos</a>
</div>

<!-- DASHBOARD -->
<div id="home" class="page active">
<h2>Dashboard</h2>

<div class="slider">
<div class="slide active">NEXUS SYSTEM</div>
<div class="slide">Monitoramento Inteligente</div>
<div class="slide">Infraestrutura TI</div>

<div class="nav">
<span onclick="prev()">‹</span>
<span onclick="next()">›</span>
</div>

<div class="dots">
<span onclick="go(0)" class="active"></span>
<span onclick="go(1)"></span>
<span onclick="go(2)"></span>
</div>
</div>

<div class="cards">
<div class="card">Chamados: <b id="totalChamados">0</b></div>
<div class="card">Andamento: <b id="andamento">0</b></div>
<div class="card">Resolvidos: <b id="resolvidos">0</b></div>
</div>
</div>

<!-- OUTRAS PAGES -->
<div id="system" class="page"><h2>Sistema</h2></div>
<div id="support" class="page"><h2>Suporte</h2></div>
<div id="about" class="page"><h2>Sobre</h2></div>
<div id="course" class="page"><h2>Cursos</h2></div>

<div id="ods" class="page">
<h2>ODS 9</h2>
<p>Inovação e tecnologia.</p>
</div>

<div id="contato" class="page">
<h2>Contatos</h2>

<div class="social-cards">
<div class="social-card" onclick="window.open('https://linkedin.com','_blank')">
<i class="fab fa-linkedin"></i> LinkedIn
</div>

<div class="social-card" onclick="window.open('https://github.com','_blank')">
<i class="fab fa-github"></i> GitHub
</div>
</div>
</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">
  <div class="chat-header">Chat Suporte</div>

  <div id="chatMessages" style="height:200px; overflow-y:auto; padding:10px;"></div>

  <div class="chat-body">
    <input id="nomeChat" placeholder="Seu nome">
    <input id="mensagemChat" placeholder="Digite sua mensagem">
    <button onclick="enviarMensagem()">Enviar</button>
  </div>
</div>

<a class="whats" href="https://wa.me/5521981048650" target="_blank">📱</a>

<!-- SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  serverTimestamp,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC0P6CwncDoEQnW8Yd_2rjdXllwcVaqS1M",
  authDomain: "chamados-17bc3.firebaseapp.com",
  projectId: "chamados-17bc3",
  storageBucket: "chamados-17bc3.firebasestorage.app",
  messagingSenderId: "352897852293",
  appId: "1:352897852293:web:989ed88f0dfb9e2d561aec",
  measurementId: "G-7BMJGH1QV8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

/* ================= NAV ================= */
window.showPage = function(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const el = document.getElementById(id);
  if(el) el.classList.add("active");
}

/* ================= CHAT REALTIME ================= */
window.enviarMensagem = async function(){

  const nome = document.getElementById("nomeChat").value;
  const mensagem = document.getElementById("mensagemChat").value;

  if(!nome || !mensagem) return;

  await addDoc(collection(db, "chat"), {
    nome,
    mensagem,
    data: serverTimestamp()
  });

  document.getElementById("mensagemChat").value="";
}

const q = query(collection(db, "chat"), orderBy("data"));

onSnapshot(q, (snapshot) => {

  const chatBox = document.getElementById("chatMessages");
  if(!chatBox) return;

  chatBox.innerHTML = "";

  snapshot.forEach(doc => {
    let d = doc.data();

    chatBox.innerHTML += `
      <div style="margin-bottom:8px">
        <b>${d.nome}:</b> ${d.mensagem}
      </div>
    `;
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

/* ================= DASH ================= */
async function load(){
  try{
    let snap = await getDocs(collection(db,"chamados"));
    document.getElementById("totalChamados").innerText = snap.size;
  }catch(e){
    console.log("Dashboard ok sem dados");
  }
}
load();

/* ================= SLIDER ================= */
let i = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dots span");

function show(n){
  if(slides.length === 0) return;

  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[n].classList.add("active");
  if(dots[n]) dots[n].classList.add("active");

  i = n;
}

window.next = () => show((i+1)%slides.length);
window.prev = () => show((i-1+slides.length)%slides.length);
window.go = (n) => show(n);

/* AUTO SLIDE */
if(slides.length > 0){
  setInterval(()=>next(),4000);
}

</script>

</body>
</html>
